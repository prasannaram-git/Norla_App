<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Norla Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .card {
      background: #0F0F0F;
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      min-width: 360px;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #059669, #0D9488);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      color: #FAFAFA;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .badge {
      display: inline-block;
      background: rgba(5, 150, 105, 0.15);
      color: #34D399;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 24px;
    }
    .loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 6px;
    }
    .loader .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #059669;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .loader .dot:nth-child(2) { animation-delay: 0.2s; }
    .loader .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
    .status {
      font-size: 12px;
      color: #737373;
      margin-top: 16px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">N</div>
    <div class="title">Norla Admin</div>
    <div class="badge">Desktop Panel</div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status">Connecting to server...</div>
  </div>
</body>
</html>
