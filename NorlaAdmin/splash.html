<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0D9488 0%, #115E59 100%);
      border-radius: 20px;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }
    .title {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-bottom: 32px;
    }
    .loader {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-text {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      font-weight: 600;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
  </style>
</head>
<body>
  <img src="../LOGO/Norla_without_bg_logo.png" class="logo" alt="Norla" />
  <div class="title">Norla Admin</div>
  <div class="subtitle">Starting Server...</div>
  <div class="loader">
    <div class="spinner"></div>
    <span class="loader-text">Initializing services</span>
  </div>
</body>
</html>
