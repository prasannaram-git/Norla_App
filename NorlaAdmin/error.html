<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Connection Error — Norla Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0F0F0F;
      color: #FAFAFA;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }
    .container { max-width: 420px; padding: 40px; }
    .icon { font-size: 48px; margin-bottom: 20px; opacity: 0.4; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 13px; color: #737373; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 12px 28px; border-radius: 12px;
      background: #059669; color: white; font-size: 13px; font-weight: 700;
      border: none; cursor: pointer; transition: background 0.2s;
    }
    .btn:hover { background: #047857; }
    .hint { font-size: 11px; color: #525252; margin-top: 20px; }
    code { background: #1A1A1A; padding: 2px 8px; border-radius: 6px; font-size: 11px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>Unable to Connect</h1>
    <p>Could not reach the Norla server. Make sure the server is running and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    <p class="hint">
      Local: <code>npm run dev</code> in nureli folder<br>
      Production: Check Render dashboard
    </p>
  </div>
</body>
</html>
